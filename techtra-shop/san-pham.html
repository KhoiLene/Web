<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đang tải sản phẩm... | Techtra</title>
<link rel="stylesheet" href="san-pham.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ─── HEADER ─────────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="logo">techtra<span>.</span></a>
      <button class="nav-pill"><i class="fas fa-grip"></i> Danh mục <i class="fas fa-chevron-down" style="font-size:10px"></i></button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Bạn muốn mua gì hôm nay?">
      </div>
      <div class="topbar-actions">
        <a href="/gio-hang" class="cart-btn">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge" id="cartBadge">0</span>
        </a>
        <a href="/dang-nhap" class="login-btn"><i class="fas fa-user-circle"></i> Đăng nhập</a>
      </div>
    </div>
  </header>

  <!-- ─── LOADING / ERROR ────────────────────────────────────────────────── -->
  <div class="state-message" id="loadingState">⌛ Đang tải sản phẩm...</div>
  <div class="state-message error" id="errorState" style="display:none;"></div>

  <!-- ─── MAIN ───────────────────────────────────────────────────────────── -->
  <main class="product-wrapper" id="productWrapper" style="display:none;">

    <div class="breadcrumb" id="breadcrumb"></div>

    <div class="product-grid">

      <!-- ─── CỘT TRÁI: ẢNH + VIDEO (chung 1 gallery) ─────────────────────── -->
      <div class="gallery">
        <div class="main-image-box">
          <img id="mainImage" src="" alt="" style="display:none;">
          <video id="mainVideo" controls style="display:none;"></video>
          <button class="gallery-arrow gallery-arrow-left" id="galleryPrev">‹</button>
          <button class="gallery-arrow gallery-arrow-right" id="galleryNext">›</button>
        </div>
        <div class="thumbnails" id="thumbnails"></div>

        <!-- MÔ TẢ (dưới ảnh, giống cột trái CellphoneS) -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="mota">Mô tả</button>
          <button class="tab-btn" data-tab="danhgia">Đánh giá</button>
        </div>
        <div class="tab-content" id="tabMota">
          <div class="description-content" id="descriptionContent">Sản phẩm chưa có mô tả.</div>
        </div>
        <div class="tab-content" id="tabDanhgia" style="display:none;">
          <p class="empty-note">Chưa có đánh giá nào cho sản phẩm này.</p>
        </div>
      </div>

      <!-- ─── CỘT PHẢI: THÔNG TIN ─────────────────────────────────────────── -->
      <div class="info">
        <h1 id="productName"></h1>
        <div class="rating-row">
          <span class="stars">★★★★★</span>
          <span class="sku" id="productSku"></span>
        </div>

        <!-- Giá -->
        <div class="price-box">
          <div class="price-row">
            <span class="final-price" id="finalPrice"></span>
            <span class="old-price" id="oldPrice" style="display:none;"></span>
          </div>
          <span class="discount-badge" id="discountBadge" style="display:none;"></span>
        </div>

        <!-- Tồn kho -->
        <div class="stock-info" id="stockInfo"></div>

        <!-- Số lượng -->
        <div class="quantity-row">
          <span class="label">Số lượng</span>
          <div class="quantity-box">
            <button id="qtyMinus">−</button>
            <span id="qtyValue">1</span>
            <button id="qtyPlus">+</button>
          </div>
        </div>

        <!-- COD -->
        <div class="cod-info" id="codInfo" style="display:none;">
          <i class="fas fa-money-bill-wave"></i> Hỗ trợ thanh toán khi nhận hàng (COD)
        </div>

        <!-- CTA -->
        <div class="cta-row">
          <button class="btn-outline" id="btnAddCart"><i class="fas fa-cart-plus"></i> Thêm vào giỏ</button>
          <button class="btn-primary" id="btnBuyNow">Mua ngay</button>
        </div>

        <!-- Box chi nhánh / vận chuyển -->
        <div class="branch-box">
          <i class="fas fa-store"></i>
          <div>
            <strong>Giao hàng toàn quốc</strong>
            <p>Miễn phí vận chuyển cho đơn từ 500.000đ</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ─── SẢN PHẨM TƯƠNG TỰ ─────────────────────────────────────────────── -->
    <section class="related-section" id="relatedSection" style="display:none;">
      <h2>Có thể bạn cũng thích</h2>
      <div class="related-grid" id="relatedGrid"></div>
    </section>

  </main>

  <script type="module" src="san-pham.js"></script>
</body>
</html>
